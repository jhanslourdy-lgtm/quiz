<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Connexion | Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @media (max-width: 480px) {
            .bg-white {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.875rem;
            }
            .text-gray-500 {
                font-size: 0.875rem;
            }
            input {
                padding: 0.75rem;
            }
        }
        /* Amélioration du touché */
        button, a {
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-indigo-800 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8 sm:mb-10">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Bienvenue</h1>
            <p class="text-sm sm:text-base text-gray-500 mt-2">Connectez-vous pour continuer</p>
        </div>

        <div th:if="${erreur}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-6 rounded text-sm">
            <p th:text="${erreur}"></p>
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-5 sm:space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Nom d'utilisateur / Email</label>
                <input type="text" name="username" required 
                    class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm sm:text-base">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Mot de passe (Admin uniquement)</label>
                <input type="password" name="password" placeholder="Laissez vide si vous êtes participant"
                    class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm sm:text-base">
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 text-white py-3 sm:py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg text-sm sm:text-base">
                Se connecter
            </button>
            
            <div class="mt-6 sm:mt-8 pt-4 sm:pt-6 border-t border-gray-100 text-center">
                <p class="text-gray-600 mb-3 sm:mb-4 text-sm sm:text-base">Nouveau sur Quiz Master ?</p>
                <a th:href="@{/register}" 
                   class="inline-block w-full border-2 border-indigo-600 text-indigo-600 py-3 sm:py-4 rounded-xl font-bold hover:bg-indigo-50 transition text-sm sm:text-base">
                    Créer un compte
                </a>
            </div>
        </form>
    </div>
</body>
</html>

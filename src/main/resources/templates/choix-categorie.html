<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Choisir un Quiz | Quiz Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-5xl mx-auto py-16 px-6">
        <div class="text-center mb-16">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Prêt pour le défi ?</h1>
            <p class="text-xl text-gray-600">Sélectionnez une catégorie pour commencer votre évaluation.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <a href="/quiz/MATHS" class="group bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-2 border-b-8 border-blue-500 text-center">
                <div class="bg-blue-100 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-blue-500 transition-colors">
                    <i class="fas fa-calculator text-blue-600 text-3xl group-hover:text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Mathématiques</h2>
                <p class="text-gray-500">Algèbre, Géométrie et Logique.</p>
            </a>

            <a href="/quiz/CHIMIE" class="group bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-2 border-b-8 border-pink-500 text-center">
                <div class="bg-pink-100 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-pink-500 transition-colors">
                    <i class="fas fa-flask text-pink-600 text-3xl group-hover:text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Chimie</h2>
                <p class="text-gray-500">Réactions, Éléments et Molécules.</p>
            </a>

            <a href="/quiz/ANGLAIS" class="group bg-white p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all transform hover:-translate-y-2 border-b-8 border-indigo-500 text-center">
                <div class="bg-indigo-100 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-indigo-500 transition-colors">
                    <i class="fas fa-language text-indigo-600 text-3xl group-hover:text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Anglais</h2>
                <p class="text-gray-500">Grammaire, Vocabulaire et Compréhension.</p>
            </a>
        </div>
        
        <div class="text-center mt-12">
            <a href="/logout" class="text-gray-500 hover:text-red-500 font-medium"><i class="fas fa-sign-out-alt"></i> Se déconnecter</a>
        </div>
    </div>
</body>
</html>

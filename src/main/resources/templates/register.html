<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription | Quiz App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-600 to-teal-700 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
        <div class="mb-8">
            <div class="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-plus text-green-600 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Créer un compte</h1>
            <p class="text-gray-500">Rejoignez l'aventure Quiz Master</p>
        </div>

        <form id="registerForm" class="space-y-4 text-left">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Nom Complet</label>
                <input type="text" id="nom" required class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Email</label>
                <input type="email" id="email" required class="w-full mt-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            
            <button type="button" onclick="validerInscription()" 
                class="w-full bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition shadow-lg mt-4">
                S'inscrire maintenant
            </button>
        </form>
        
        <p class="mt-6 text-sm text-gray-600">
            Déjà inscrit ? <a href="/" class="text-green-600 font-bold hover:underline">Connectez-vous</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        async function validerInscription() {
            const participant = {
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value
            };

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(participant)
                });

                if (response.ok) {
                    Swal.fire('Succès !', 'Votre compte a été créé. Connectez-vous avec votre email.', 'success')
                        .then(() => window.location.href = "/");
                } else {
                    Swal.fire('Erreur', 'Cet email est déjà utilisé.', 'error');
                }
            } catch (error) {
                Swal.fire('Erreur', 'Connexion au serveur impossible.', 'error');
            }
        }
    </script>
</body>
</html>

# src/test/resources/application-test.properties

# Utiliser H2 pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (pour les tests)
jwt.secret=testSecretKeyForJWTTokenGenerationAndValidationInTests12345678901234567890
jwt.expiration=86400000

# D\u00e9sactiver la s\u00e9curit\u00e9 pour les tests si n\u00e9cessaire
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.quiz.app=DEBUG
